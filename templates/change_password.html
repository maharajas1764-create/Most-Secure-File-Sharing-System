<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 Change Password · Secure File Share</title>
    <!-- Fonts & icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .password-card {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 2.5rem 2rem;
        }

        .badge-soft {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50px;
            padding: 0.5rem 1.5rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: white;
            margin-bottom: 1.5rem;
        }

        h2 {
            font-weight: 700;
            font-size: 2rem;
            color: #333;
            margin-bottom: 0.3rem;
        }

        .sub-head {
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .password-field {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .password-field i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
            font-size: 1.1rem;
            z-index: 2;
        }

        .password-field input {
            width: 100%;
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            padding: 1rem 1rem 1rem 45px;
            font-size: 1rem;
            color: #333;
            outline: none;
        }

        .password-field input:focus {
            border-color: #667eea;
        }

        .match-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            margin: 0.5rem 0 1rem;
            padding: 0.5rem;
            border-radius: 8px;
            background: #f8f9fa;
        }

        .match-indicator.match {
            color: #28a745;
        }

        .match-indicator.no-match {
            color: #dc3545;
        }

        .btn-update {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            padding: 1rem;
            font-weight: 600;
            font-size: 1.1rem;
            color: white;
            width: 100%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
        }

        .btn-update:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-update:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #667eea;
            text-decoration: none;
            font-size: 0.95rem;
            margin-top: 1.5rem;
        }

        .back-link:hover {
            color: #764ba2;
        }

        .alert {
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }

        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }

        .spinner {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="password-card">
        <!-- Flash messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">
                        <i class="fas fa-{% if category == 'success' %}check-circle{% else %}exclamation-circle{% endif %}"></i>
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <div class="badge-soft">
            <i class="fas fa-shield-alt"></i>
            <span>SECURE PASSWORD CHANGE</span>
        </div>

        <h2>Change Password</h2>
        <div class="sub-head">Update your password</div>

        <form method="POST" action="{{ url_for('change_password') }}" onsubmit="return validateForm()">
            <!-- Current Password -->
            <div class="password-field">
                <i class="fas fa-lock"></i>
                <input type="password" id="currentPassword" name="current_password" 
                       placeholder="Current Password" minlength="8" maxlength="8" required>
            </div>

            <!-- New Password -->
            <div class="password-field">
                <i class="fas fa-lock"></i>
                <input type="password" id="newPassword" name="new_password" 
                       placeholder="New Password" minlength="8" maxlength="8" required>
            </div>

            <!-- Confirm Password -->
            <div class="password-field">
                <i class="fas fa-lock"></i>
                <input type="password" id="confirmPassword" name="confirm_password" 
                       placeholder="Confirm Password" minlength="8" maxlength="8" required>
            </div>

            <!-- Password Match Indicator -->
            <div class="match-indicator" id="matchIndicator">
                <i class="fas fa-info-circle"></i>
                <span>Confirm your password</span>
            </div>

            <button type="submit" class="btn-update" id="submitBtn">
                <i class="fas fa-sync-alt"></i>
                Update Password
            </button>
        </form>

        <a href="{{ url_for('dashboard') }}" class="back-link">
            <i class="fas fa-arrow-left"></i>
            Back to Dashboard
        </a>
    </div>

    <script>
        // Real-time password match check
        const newPass = document.getElementById('newPassword');
        const confirmPass = document.getElementById('confirmPassword');
        const matchIndicator = document.getElementById('matchIndicator');

        function checkMatch() {
            if (confirmPass.value.length === 0) {
                matchIndicator.className = 'match-indicator';
                matchIndicator.innerHTML = '<i class="fas fa-info-circle"></i><span>Confirm your password</span>';
            } else if (newPass.value === confirmPass.value) {
                matchIndicator.className = 'match-indicator match';
                matchIndicator.innerHTML = '<i class="fas fa-check-circle"></i><span>Passwords match</span>';
            } else {
                matchIndicator.className = 'match-indicator no-match';
                matchIndicator.innerHTML = '<i class="fas fa-times-circle"></i><span>Passwords do not match</span>';
            }
        }

        newPass.addEventListener('input', checkMatch);
        confirmPass.addEventListener('input', checkMatch);

        // Form validation
        function validateForm() {
            const current = document.getElementById('currentPassword').value;
            const newPwd = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
            
            if (newPwd !== confirm) {
                alert('Error: Passwords do not match!');
                return false;
            }
            
            if (current === newPwd) {
                alert('Error: New password cannot be same as current!');
                return false;
            }
            
            document.getElementById('submitBtn').innerHTML = '<i class="fas fa-spinner spinner"></i> Updating...';
            return true;
        }

        // Auto-dismiss alerts
        setTimeout(() => {
            document.querySelectorAll('.alert').forEach(alert => alert.remove());
        }, 5000);
    </script>
</body>
</html>
