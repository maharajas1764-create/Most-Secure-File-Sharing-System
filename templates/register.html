<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Register{% endblock %}</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap">
  <style>
    * {
      margin: 0;
      padding: 0;
      font-family: "Poppins", sans-serif;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0c0c0c;
      min-height: 100vh;
    }

    .login-box {
      width: 450px;
      background: #1f293a;
      padding: 30px;
      border-radius: 10px;
    }

    h2 {
      font-size: 22px;
      color: #0ef;
      text-align: center;
      margin-bottom: 20px;
    }

    .input-box {
      position: relative;
      margin: 20px 0;
    }

    .input-box input {
      width: 100%;
      height: 50px;
      background: transparent;
      border: 2px solid #2c4766;
      outline: none;
      border-radius: 40px;
      font-size: 1em;
      color: #fff;
      padding: 0 20px;
      transition: 0.5s;
    }

    .input-box input:focus,
    .input-box input:valid {
      border-color: #0ef;
    }

    .input-box label {
      position: absolute;
      top: 50%;
      left: 20px;
      transform: translateY(-50%);
      font-size: 1em;
      color: #fff;
      pointer-events: none;
      transition: 0.5s ease;
    }

    .input-box input:focus ~ label,
    .input-box input:valid ~ label {
      top: -8px;
      font-size: 0.8em;
      background-color: #1f293a;
      padding: 0 6px;
      color: #0ef;
    }

    .btn {
      width: 100%;
      height: 45px;
      border-radius: 45px;
      background: #0ef;
      border: none;
      outline: none;
      cursor: pointer;
      font-size: 1em;
      color: #1f293a;
      font-weight: 600;
      transition: 0.3s;
      margin-top: 10px;
    }

    .btn:hover {
      background: #0cf;
      transform: scale(1.02);
    }

    .signup-link {
      margin: 15px 0 5px;
      text-align: center;
    }

    .signup-link a {
      font-size: 1em;
      color: #0ef;
      text-decoration: none;
      font-weight: 600;
    }

    .signup-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <h2>Create Account</h2>
    <form method="POST" action="{{ url_for('register') }}">
      
      <div class="input-box">
        <input type="text" id="username" name="username" required>
        <label>Username</label>
      </div>

      <div class="input-box">
        <input type="email" id="email" name="email" required>
        <label>Email</label>
      </div>

      <div class="input-box">
        <input type="password" id="password" name="password" minlength="8" maxlength="8" required>
        <label>Password</label>
      </div>

      <div class="input-box">
        <input type="password" id="confirm_password" name="confirm_password" minlength="8" maxlength="8" required>
        <label>Confirm Password</label>
      </div>

      <button type="submit" class="btn">Register</button>

      <div class="signup-link">
        <a href="{{ url_for('login') }}">Login here</a>
      </div>

    </form>
  </div>

  <script>
    // Password confirmation validation
    document.addEventListener('DOMContentLoaded', function() {
      const password = document.getElementById('password');
      const confirmPassword = document.getElementById('confirm_password');
      
      function validatePassword() {
        if (password.value !== confirmPassword.value) {
          confirmPassword.setCustomValidity("Passwords don't match");
        } else {
          confirmPassword.setCustomValidity('');
        }
      }
      
      password.addEventListener('change', validatePassword);
      confirmPassword.addEventListener('keyup', validatePassword);
    });
  </script>

</body>
</html>
