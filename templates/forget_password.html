<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Reset Password · OTP Verification</title>
    <!-- Fonts & icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 10% 30%, #1e2b5e, #0b0f1f);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            position: relative;
        }

        /* animated orbs */
        .ambient-glow {
            position: fixed; inset: 0; pointer-events: none; z-index: 0;
        }
        .glow-orb {
            position: absolute; width: 300px; height: 300px; border-radius: 50%; filter: blur(80px); 
            animation: drift 18s infinite alternate ease-in-out;
        }
        .glow-orb:nth-child(1) { top: -50px; right: -50px; background: #5f3b9b; opacity: 0.5; }
        .glow-orb:nth-child(2) { bottom: -30px; left: -20px; width: 400px; height: 400px; background: #1f7a8c; opacity: 0.3; animation-delay: -5s; }
        .glow-orb:nth-child(3) { top: 40%; left: 30%; width: 500px; height: 500px; background: #5e4b8a; opacity: 0.15; filter: blur(120px); animation: drift2 25s infinite; }
        @keyframes drift {
            0% { transform: translate(0,0) scale(1); }
            100% { transform: translate(40px,40px) scale(1.2); }
        }
        @keyframes drift2 {
            0% { transform: translate(0,0) scale(1); }
            100% { transform: translate(-60px,20px) scale(1.5); }
        }

        /* main glass card */
        .password-card {
            position: relative; z-index: 10; max-width: 500px; width: 100%;
            background: rgba(20, 30, 50, 0.35);
            backdrop-filter: blur(18px);
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 35px 75px rgba(0,0,0,0.6);
            padding: 2.5rem 2rem;
        }

        .badge-soft {
            background: rgba(255,255,255,0.1); border-radius: 60px; padding: 0.4rem 1.3rem;
            display: inline-flex; align-items: center; gap: 0.6rem; font-size: 0.8rem; font-weight: 600;
            color: #b3dcff; border: 1px solid rgba(255,255,255,0.15); margin-bottom: 1.8rem;
        }
        .badge-soft i { color: #a0d2ff; }

        h2 {
            font-weight: 700; font-size: 2.2rem;
            background: linear-gradient(135deg, #ffffff, #d6e6ff);
            -webkit-background-clip: text; background-clip: text; color: transparent;
            margin-bottom: 0.3rem;
        }
        .sub-head {
            color: rgba(210,230,255,0.8); font-size: 0.95rem; margin-bottom: 2rem;
        }

        /* step dots */
        .step-indicator {
            display: flex; gap: 0.6rem; margin-bottom: 2.5rem;
        }
        .step-dot {
            flex: 1; height: 6px; background: rgba(255,255,255,0.15); border-radius: 12px;
        }
        .step-dot.active {
            background: linear-gradient(90deg, #6eb6ff, #b78aff); box-shadow: 0 0 12px #6d8cff;
        }

        /* step panels */
        .step-panel { display: none; }
        .step-panel.active-panel { display: block; }

        /* email field */
        .email-field {
            background: rgba(0,0,0,0.25); border: 1.5px solid rgba(255,255,255,0.1); border-radius: 60px;
            padding: 1.1rem 1.8rem; color: white; width: 100%; font-size: 1rem;
            outline: none; text-align: center;
        }
        .email-field:focus { border-color: #80b4ff; }
        .email-wrapper {
            position: relative; margin: 1.8rem 0 2.2rem;
        }
        .email-wrapper i {
            position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
            color: #b6d0ff; font-size: 1.2rem;
        }

        /* buttons */
        .btn-glow {
            background: linear-gradient(145deg, #305f9e, #263f7c); border: none; border-radius: 60px;
            padding: 1rem 2rem; font-weight: 600; font-size: 1.1rem; color: white; width: 100%;
            display: flex; align-items: center; justify-content: center; gap: 0.8rem; cursor: pointer;
        }
        .btn-glow:hover:not(:disabled) {
            background: linear-gradient(145deg, #3f6eb5, #2f4d91); transform: scale(1.02);
        }
        .btn-glow:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-success { background: linear-gradient(145deg, #2d7a6c, #1d5b4c); }

        /* OTP boxes */
        .otp-group {
            display: flex; gap: 0.7rem; justify-content: center; margin: 2rem 0 1.5rem;
        }
        .otp-digit {
            width: 60px; height: 68px; background: rgba(0,0,0,0.3);
            border: 2px solid rgba(255,255,255,0.15); border-radius: 20px; font-size: 2.2rem;
            font-weight: 600; text-align: center; color: white; outline: none;
        }
        .otp-digit:focus {
            border-color: #6aa9ff; box-shadow: 0 0 15px #4d7dcc; background: rgba(40,60,100,0.5);
        }

        .timer-badge {
            background: rgba(255,255,255,0.05); border-radius: 50px; padding: 0.45rem 1.5rem;
            color: #d3e5ff; border: 1px solid rgba(255,255,255,0.1); font-size: 1.1rem;
            display: inline-flex; align-items: center; gap: 0.5rem;
        }

        .resend-btn {
            background: transparent; border: 1.5px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.7);
            padding: 0.6rem 1.6rem; border-radius: 40px; font-weight: 500; font-size: 0.9rem;
        }
        .resend-btn:not(:disabled) {
            border-color: #5faaff; color: #b6d6ff; cursor: pointer;
        }

        /* password fields */
        .password-container { margin-bottom: 2rem; }
        
        .password-field {
            position: relative; margin-bottom: 1rem;
        }
        
        .password-field i {
            position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
            color: rgba(210,230,255,0.8); font-size: 1.1rem; z-index: 2;
        }
        
        .password-field input {
            width: 100%; background: rgba(0,0,0,0.3);
            border: 1.5px solid rgba(255,255,255,0.1); border-radius: 50px;
            padding: 1rem 1rem 1rem 2.8rem; font-size: 1rem; color: white; outline: none;
        }
        
        .password-field input:focus {
            border-color: #7aaaff; box-shadow: 0 0 12px #3b6bc0;
        }
        
        .match-badge {
            font-size: 0.85rem; margin-top: 0.5rem; color: #c5dcff; text-align: center;
        }
        .match-badge i.fa-check { color: #62d984; }
        .match-badge i.fa-times { color: #ff8a8a; }

        /* toast container */
        .toast-corner {
            position: fixed; top: 20px; right: 20px; z-index: 999;
        }
        .toast-message {
            background: rgba(30,40,65,0.9); backdrop-filter: blur(16px); border-left: 5px solid #629cff;
            color: white; padding: 0.9rem 1.5rem; border-radius: 50px; font-weight: 500;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; gap: 0.8rem; margin-bottom: 10px;
        }
        .toast-message.error { border-left-color: #ff6b82; }

        hr { border-color: rgba(255,255,255,0.1); margin: 1.5rem 0; }
        .text-small { font-size: 0.8rem; color: rgba(200,220,255,0.6); }
        
        .email-display {
            background: rgba(255,255,255,0.1); padding: 0.8rem; border-radius: 50px;
            text-align: center; color: white; margin: 1rem 0; font-weight: 500;
            border: 1px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <div class="ambient-glow">
        <div class="glow-orb"></div>
        <div class="glow-orb"></div>
        <div class="glow-orb"></div>
    </div>

    <div class="password-card">
        <div class="badge-soft">
            <i class="fas fa-shield-halved"></i> <span>VERIFIED · PASSWORD RESET</span>
        </div>
        <h2>Reset password</h2>
        <div class="sub-head">Secure OTP verification for registered users</div>

        <div class="step-indicator" id="stepDots">
            <div class="step-dot active" data-step="1"></div>
            <div class="step-dot" data-step="2"></div>
            <div class="step-dot" data-step="3"></div>
        </div>

        <!-- STEP 1 -->
        <div id="step1Panel" class="step-panel active-panel">
            <div class="email-wrapper">
                <i class="fas fa-envelope"></i>
                <input type="email" class="email-field" id="registeredEmail" placeholder="Enter registered email" required>
            </div>
            <button class="btn-glow" id="verifyEmailBtn">
                <i class="fas fa-search"></i> Verify & Send OTP
            </button>
            <hr>
            <div class="text-small"><i class="fas fa-info-circle"></i> Only registered emails will receive OTP</div>
        </div>

        <!-- STEP 2 -->
        <div id="step2Panel" class="step-panel">
            <div class="email-display" id="emailDisplay"></div>
            <div style="text-align: center; margin-bottom: 0.5rem;">
                <span class="timer-badge" id="timerDisplay"><i class="fa-regular fa-hourglass-half"></i> 05:00</span>
            </div>
            <div class="otp-group" id="otpContainer">
                <input type="text" class="otp-digit" maxlength="1" inputmode="numeric">
                <input type="text" class="otp-digit" maxlength="1" inputmode="numeric">
                <input type="text" class="otp-digit" maxlength="1" inputmode="numeric">
                <input type="text" class="otp-digit" maxlength="1" inputmode="numeric">
                <input type="text" class="otp-digit" maxlength="1" inputmode="numeric">
                <input type="text" class="otp-digit" maxlength="1" inputmode="numeric">
            </div>
            <button class="btn-glow btn-success" id="verifyOtpBtn">
                <i class="fas fa-check-circle"></i> Verify code
            </button>
            <div style="display: flex; justify-content: center; margin-top: 1.2rem;">
                <button class="resend-btn" id="resendOtpBtn" disabled><i class="fas fa-rotate-right"></i> Resend OTP</button>
            </div>
            <div class="text-small" style="text-align: center; margin-top: 0.5rem;" id="resendHint">wait for expiry</div>
        </div>

        <!-- STEP 3 -->
        <div id="step3Panel" class="step-panel">
            <form id="newPasswordForm" method="POST" action="{{ url_for('forget_password') }}">
                <input type="hidden" id="otpVerified" name="otp_verified" value="false">
                <input type="hidden" id="resetEmail" name="email" value="">
                
                <div class="password-container">
                    <div class="password-field">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="newPass" name="new_password" placeholder="New password" minlength="8" maxlength="8" required>
                    </div>

                    <div class="password-field">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="confirmPass" name="confirm_password" placeholder="Confirm password" minlength="8" maxlength="8" required>
                    </div>
                </div>
                
                <div class="match-badge" id="matchIndicator"></div>

                <button type="submit" class="btn-glow" style="margin-top: 1.5rem; background: linear-gradient(145deg,#4b4085,#352b63);">
                    <i class="fas fa-cloud-upload-alt"></i> Update password
                </button>
            </form>
        </div>
    </div>

    <div class="toast-corner" id="toastContainer"></div>

    <script>
        (function() {
            let currentStep = 1;
            let timerSeconds = 300;
            let timerInterval = null;
            let resendEnabled = false;
            let generatedOTP = null;
            let otpTimestamp = null;
            let verifiedEmail = null;
            const otpLength = 6;
            const OTP_EXPIRY_SECONDS = 300; // 5 minutes

            const stepDots = document.querySelectorAll('.step-dot');
            const panel1 = document.getElementById('step1Panel');
            const panel2 = document.getElementById('step2Panel');
            const panel3 = document.getElementById('step3Panel');
            const verifyEmailBtn = document.getElementById('verifyEmailBtn');
            const registeredEmail = document.getElementById('registeredEmail');
            const verifyOtpBtn = document.getElementById('verifyOtpBtn');
            const resendBtn = document.getElementById('resendOtpBtn');
            const timerDisplay = document.getElementById('timerDisplay');
            const resendHint = document.getElementById('resendHint');
            const otpInputs = document.querySelectorAll('.otp-digit');
            const newPassInput = document.getElementById('newPass');
            const confirmInput = document.getElementById('confirmPass');
            const matchIndicator = document.getElementById('matchIndicator');
            const form = document.getElementById('newPasswordForm');
            const otpVerified = document.getElementById('otpVerified');
            const resetEmail = document.getElementById('resetEmail');
            const toaster = document.getElementById('toastContainer');
            const emailDisplay = document.getElementById('emailDisplay');

            function showToast(text, isError = false) {
                const toast = document.createElement('div');
                toast.className = `toast-message ${isError ? 'error' : ''}`;
                toast.innerHTML = `<i class="fa-${isError ? 'times-circle' : 'check-circle'}"></i> ${text}`;
                toaster.appendChild(toast);
                setTimeout(() => toast.remove(), 4000);
            }

            function generateOTP() {
                return Math.floor(100000 + Math.random() * 900000).toString();
            }

            function setStep(step) {
                currentStep = step;
                stepDots.forEach((dot, idx) => dot.classList.toggle('active', idx + 1 === step));
                panel1.classList.toggle('active-panel', step === 1);
                panel2.classList.toggle('active-panel', step === 2);
                panel3.classList.toggle('active-panel', step === 3);
            }

            function updateTimerDisplay() {
                const mins = Math.floor(timerSeconds / 60);
                const secs = timerSeconds % 60;
                timerDisplay.innerHTML = `<i class="fa-regular fa-hourglass-half"></i> ${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
            }

            function stopTimer() {
                if (timerInterval) clearInterval(timerInterval);
            }

            function startTimer(initial = 300) {
                stopTimer();
                timerSeconds = initial;
                resendEnabled = false;
                resendBtn.disabled = true;
                resendHint.innerText = 'wait for expiry';
                updateTimerDisplay();

                timerInterval = setInterval(() => {
                    timerSeconds -= 1;
                    updateTimerDisplay();
                    if (timerSeconds <= 0) {
                        stopTimer();
                        resendEnabled = true;
                        resendBtn.disabled = false;
                        resendHint.innerText = 'ready to resend';
                        showToast('OTP expired, you can resend', true);
                    }
                }, 1000);
            }

            function isOtpExpired() {
                if (!otpTimestamp) return true;
                const now = Date.now();
                const elapsedSeconds = Math.floor((now - otpTimestamp) / 1000);
                return elapsedSeconds >= OTP_EXPIRY_SECONDS;
            }

            function goToOtpStep(email) {
                verifiedEmail = email;
                emailDisplay.textContent = `📧 ${email}`;
                resetEmail.value = email;
                setStep(2);
                startTimer(300);
                otpInputs.forEach(inp => inp.value = '');
                otpInputs[0]?.focus();
            }

            otpInputs.forEach((input, index) => {
                input.addEventListener('input', (e) => {
                    e.target.value = e.target.value.replace(/[^0-9]/g, '').slice(0,1);
                    if (e.target.value && index < otpInputs.length-1) otpInputs[index+1].focus();
                });
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && !input.value && index > 0) otpInputs[index-1].focus();
                });
            });

            verifyEmailBtn.addEventListener('click', () => {
                const email = registeredEmail.value.trim();
                if (!email) return showToast('Please enter your email', true);

                verifyEmailBtn.disabled = true;
                verifyEmailBtn.innerHTML = `<i class="fas fa-spinner fa-pulse"></i> Verifying...`;

                fetch('/check-email', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.exists) {
                        const otp = generateOTP();
                        generatedOTP = otp;
                        otpTimestamp = Date.now(); // Store timestamp when OTP is generated

                        return fetch('/send-otp', {
                            method: 'POST', headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ email, otp, username: data.username })
                        })
                        .then(res => res.json())
                        .then(otpData => {
                            if (otpData.success) {
                                showToast(`✅ OTP sent to ${email}`);
                                goToOtpStep(email);
                            } else {
                                showToast('❌ Failed to send OTP', true);
                                verifyEmailBtn.disabled = false;
                                verifyEmailBtn.innerHTML = '<i class="fas fa-search"></i> Verify & Send OTP';
                            }
                        });
                    } else {
                        showToast('❌ Email not registered!', true);
                        verifyEmailBtn.disabled = false;
                        verifyEmailBtn.innerHTML = '<i class="fas fa-search"></i> Verify & Send OTP';
                    }
                })
                .catch(() => {
                    showToast('❌ Network error', true);
                    verifyEmailBtn.disabled = false;
                    verifyEmailBtn.innerHTML = '<i class="fas fa-search"></i> Verify & Send OTP';
                });
            });

            verifyOtpBtn.addEventListener('click', () => {
                const otpCode = Array.from(otpInputs).map(i => i.value).join('');
                if (otpCode.length !== otpLength) return showToast('Please enter 6-digit code', true);

                // Check if OTP is expired
                if (isOtpExpired()) {
                    showToast('❌ OTP expired! Please resend', true);
                    stopTimer();
                    resendEnabled = true;
                    resendBtn.disabled = false;
                    resendHint.innerText = 'ready to resend';
                    otpInputs.forEach(i => i.value = '');
                    otpInputs[0].focus();
                    return;
                }

                verifyOtpBtn.disabled = true;
                verifyOtpBtn.innerHTML = `<i class="fas fa-spinner fa-pulse"></i> verifying...`;

                setTimeout(() => {
                    if (otpCode === generatedOTP) {
                        showToast('✅ OTP verified!');
                        stopTimer();
                        otpVerified.value = 'true';
                        setStep(3);
                    } else {
                        showToast('❌ Invalid OTP', true);
                        otpInputs.forEach(i => i.value = '');
                        otpInputs[0].focus();
                    }
                    verifyOtpBtn.disabled = false;
                    verifyOtpBtn.innerHTML = '<i class="fas fa-check-circle"></i> Verify code';
                }, 700);
            });

            resendBtn.addEventListener('click', () => {
                if (!resendEnabled || !verifiedEmail) return;
                
                resendBtn.disabled = true;
                resendHint.innerText = 'sending...';
                
                const otp = generateOTP();
                generatedOTP = otp;
                otpTimestamp = Date.now(); // Update timestamp for new OTP

                fetch('/send-otp', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email: verifiedEmail, otp })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        showToast('✅ New OTP sent');
                        startTimer(300);
                    } else {
                        showToast('❌ Failed to resend OTP', true);
                        resendBtn.disabled = false;
                        resendHint.innerText = 'try again';
                    }
                })
                .catch(() => {
                    showToast('❌ Network error', true);
                    resendBtn.disabled = false;
                    resendHint.innerText = 'try again';
                });
            });

            function updateMatch() {
                const pass = newPassInput.value;
                const conf = confirmInput.value;
                if (!conf) matchIndicator.innerHTML = '';
                else if (pass === conf) matchIndicator.innerHTML = '<i class="fas fa-check-circle" style="color:#62d984"></i> passwords match';
                else matchIndicator.innerHTML = '<i class="fas fa-times-circle" style="color:#ff8a8a"></i> passwords do not match';
            }

            newPassInput.addEventListener('input', updateMatch);
            confirmInput.addEventListener('input', updateMatch);

            form.addEventListener('submit', (e) => {
                if (otpVerified.value !== 'true') {
                    e.preventDefault();
                    showToast('❌ Please verify OTP first', true);
                    setStep(2);
                    return;
                }
                if (newPassInput.value !== confirmInput.value) {
                    e.preventDefault();
                    showToast('Passwords do not match', true);
                }
            });

            setStep(1);
        })();
    </script>
</body>
</html>
