<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Profile · Secure File Share</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .settings-card {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 2.5rem 2rem;
        }

        .badge-soft {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50px;
            padding: 0.5rem 1.5rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: white;
            margin-bottom: 1.5rem;
        }

        h2 {
            font-weight: 700;
            font-size: 2rem;
            color: #333;
            margin-bottom: 0.3rem;
        }

        .sub-head {
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .input-field {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .input-field i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
            font-size: 1.1rem;
            z-index: 2;
        }

        .input-field input {
            width: 100%;
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            padding: 1rem 1rem 1rem 45px;
            font-size: 1rem;
            color: #333;
            outline: none;
        }

        .input-field input:focus {
            border-color: #667eea;
        }

        .btn-update {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            padding: 1rem;
            font-weight: 600;
            font-size: 1.1rem;
            color: white;
            width: 100%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
        }

        .btn-update:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #667eea;
            text-decoration: none;
            font-size: 0.95rem;
            margin-top: 1.5rem;
        }

        .back-link:hover {
            color: #764ba2;
        }

        .alert {
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }

        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }

        .spinner {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .section-title {
            font-weight: 600;
            color: #444;
            margin: 1.5rem 0 1rem 0;
            font-size: 1.1rem;
            border-bottom: 1px solid #e9ecef;
            padding-bottom: 0.5rem;
        }
        
        .section-title i {
            color: #667eea;
            margin-right: 0.5rem;
        }

        .info-text {
            font-size: 0.85rem;
            color: #6c757d;
            margin-top: -1rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="settings-card">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">
                        <i class="fas fa-{% if category == 'success' %}check-circle{% else %}exclamation-circle{% endif %}"></i>
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <h2>Update Profile</h2>        
        <form method="POST" action="{{ url_for('update_profile') }}">
            <div class="section-title">
                <i class="fas fa-key"></i> Enter Current Password
            </div>
            
            <div class="input-field">
                <i class="fas fa-lock"></i>
                <input type="password" id="currentPassword" name="current_password" 
                       placeholder="Current Password" minlength="8" maxlength="8" required>
            </div>
            
            <div class="section-title">
                <i class="fas fa-id-badge"></i> Basic Information
            </div>

            <div class="input-field">
                <i class="fas fa-user-circle"></i>
                <input type="text" id="username" name="username" 
                       placeholder="Username" value="{{ current_user.username }}" 
                       minlength="3" maxlength="30" required>
            </div>

            <div class="input-field">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" name="email" 
                       placeholder="Email address" value="{{ current_user.email }}" required>
            </div>

            <div class="section-title">
                <i class="fas fa-shield-alt"></i> Change Password (Optional)
            </div>

            <div class="input-field">
                <i class="fas fa-lock"></i>
                <input type="password" id="newPassword" name="new_password" 
                       placeholder="New Password (leave blank to keep current)" 
                       minlength="8" maxlength="8">
            </div>

            <!-- Confirm Password -->
            <div class="input-field">
                <i class="fas fa-lock"></i>
                <input type="password" id="confirmPassword" name="confirm_password" 
                       placeholder="Confirm New Password" minlength="8" maxlength="8">
            </div>

            <button type="submit" class="btn-update">
                <i class="fas fa-save"></i>
                Save Changes
            </button>
        </form>

        <a href="{{ url_for('dashboard') }}" class="back-link">
            <i class="fas fa-arrow-left"></i>
            Back to Dashboard
        </a>
    </div>
</body>
</html>
